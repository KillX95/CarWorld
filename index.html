<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarWorld - Chasse aux Drapeaux</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            background: #0a0a12;
        }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            display: none;
        }
        
        /* Menu Principal */
        #main-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        #main-menu::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 200, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        
        #main-menu h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 80px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.6), 0 0 80px rgba(255, 215, 0, 0.3);
            margin-bottom: 5px;
            letter-spacing: 12px;
            position: relative;
        }
        
        #main-menu h1::after {
            content: 'FLAG HUNTER';
            display: block;
            font-size: 24px;
            letter-spacing: 20px;
            color: #ffd700;
            margin-top: 10px;
            font-weight: 400;
        }
        
        .menu-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            padding: 16px 50px;
            margin: 8px;
            background: linear-gradient(135deg, #ffd700 0%, #ff9500 100%);
            border: none;
            border-radius: 4px;
            color: #0a0a12;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 4px;
            position: relative;
            overflow: hidden;
        }
        
        .menu-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }
        
        .menu-btn.secondary {
            background: transparent;
            border: 2px solid rgba(255, 215, 0, 0.6);
            color: #ffd700;
        }
        
        .menu-btn.secondary:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: #ffd700;
        }
        
        /* Settings Panel */
        #settings-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 15, 35, 0.98);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 16px;
            padding: 35px;
            z-index: 1001;
            min-width: 380px;
            backdrop-filter: blur(10px);
        }
        
        #settings-panel h2 {
            font-family: 'Orbitron', sans-serif;
            color: #ffd700;
            font-size: 28px;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 4px;
        }
        
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 18px 0;
            color: #ccc;
            font-size: 16px;
        }
        
        .setting-row input[type="range"] {
            width: 160px;
            accent-color: #ffd700;
        }
        
        .setting-row select {
            padding: 8px 14px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #fff;
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
        }
        
        #settings-panel .close-btn {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 28px;
            color: #ffd700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        #settings-panel .close-btn:hover {
            transform: rotate(90deg);
        }
        
        /* UI en jeu */
        #ui {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 100;
        }
        
        #score {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.5);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        
        #speedometer {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 140px;
            height: 140px;
            background: linear-gradient(145deg, rgba(20,20,40,0.9), rgba(10,10,25,0.95));
            border-radius: 50%;
            border: 3px solid #ffd700;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255,215,0,0.3), inset 0 0 30px rgba(0,0,0,0.5);
        }
        
        #speed-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 38px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        
        #speed-unit {
            font-size: 12px;
            color: #ffd700;
            letter-spacing: 2px;
        }
        
        #gear-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            color: #00ff88;
            margin-top: 4px;
            text-shadow: 0 0 8px rgba(0,255,136,0.5);
        }
        
        #instructions {
            position: absolute;
            bottom: 25px;
            left: 25px;
            color: rgba(255,255,255,0.75);
            font-size: 13px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: 10px 16px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        #win-screen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, rgba(20,20,45,0.98), rgba(10,10,25,0.98));
            padding: 50px 70px;
            border-radius: 20px;
            text-align: center;
            color: white;
            z-index: 200;
            border: 2px solid #ffd700;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.4);
        }
        
        #win-screen h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            color: #ffd700;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }
        
        #win-screen p {
            font-size: 20px;
            margin-bottom: 25px;
            color: #ccc;
        }
        
        #win-screen button {
            padding: 14px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #ffd700, #ff9500);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: #0a0a12;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        #win-screen button:hover {
            transform: scale(1.05);
        }
        
        #compass {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(20,20,40,0.85);
            border: 2px solid #ffd700;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(255,215,0,0.2);
        }
        
        #compass-arrow {
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 30px solid #ff4444;
            transform-origin: center bottom;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        
        #distance {
            position: absolute;
            top: 105px;
            right: 25px;
            color: #fff;
            font-size: 14px;
            z-index: 100;
            text-align: center;
            background: rgba(20,20,40,0.85);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,215,0,0.3);
            min-width: 70px;
        }
        
        #pause-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(5,5,15,0.9);
            z-index: 150;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        
        #pause-overlay h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 56px;
            color: #ffd700;
            margin-bottom: 40px;
            letter-spacing: 8px;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
        }
    </style>
</head>
<body>
    <!-- Menu Principal -->
    <div id="main-menu">
        <h1>CARWORLD</h1>
        <button class="menu-btn" onclick="startGame()">JOUER</button>
        <button class="menu-btn secondary" onclick="showSettings()">OPTIONS</button>
    </div>
    
    <!-- Settings Panel -->
    <div id="settings-panel">
        <span class="close-btn" onclick="hideSettings()">&times;</span>
        <h2>OPTIONS</h2>
        <div class="setting-row">
            <span>Qualité Graphique</span>
            <select id="graphics-quality">
                <option value="low">Basse</option>
                <option value="medium">Moyenne</option>
                <option value="high" selected>Haute</option>
            </select>
        </div>
        <div class="setting-row">
            <span>Volume Musique</span>
            <input type="range" id="music-volume" min="0" max="100" value="50">
        </div>
        <div class="setting-row">
            <span>Volume Effets</span>
            <input type="range" id="sfx-volume" min="0" max="100" value="80">
        </div>
        <div class="setting-row">
            <span>Nombre de Drapeaux</span>
            <input type="range" id="flag-count" min="5" max="20" value="10" oninput="this.nextElementSibling.textContent = this.value">
            <span>10</span>
        </div>
        <button class="menu-btn" onclick="hideSettings()" style="width: 100%; margin-top: 20px;">FERMER</button>
    </div>
    
    <!-- Jeu -->
    <div id="game-container"></div>
    <div id="ui">
        <div id="score">Drapeaux: 0 / 10</div>
    </div>
    <div id="compass">
        <div id="compass-arrow"></div>
    </div>
    <div id="distance">-- m</div>
    <div id="speedometer">
        <div id="speed-value">0</div>
        <div id="speed-unit">KM/H</div>
        <div id="gear-display">N</div>
    </div>
    <div id="instructions">
        <b>WASD</b> / <b>Flèches</b> : conduire &nbsp;|&nbsp; <b>Espace</b> : freiner &nbsp;|&nbsp; <b>Échap</b> : pause
    </div>
    <div id="win-screen">
        <h1>🎉 VICTOIRE ! 🎉</h1>
        <p>Tu as trouvé tous les drapeaux !</p>
        <button onclick="restartGame()">Rejouer</button>
    </div>
    <div id="pause-overlay">
        <h2>PAUSE</h2>
        <button class="menu-btn" onclick="resumeGame()">REPRENDRE</button>
        <button class="menu-btn secondary" onclick="quitToMenu()">QUITTER</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Configuration
        let WORLD_SIZE = 2000;
        let FLAG_COUNT = 10;
        
        // Physique voiture - paramètres arcade équilibrés
        const CAR = {
            maxSpeed: 120,
            acceleration: 35,
            brakeForce: 60,
            reverseSpeed: 30,
            turnSpeed: 2.0,
            friction: 0.97,
            grip: 0.95
        };

        // Variables globales
        let scene, camera, renderer, car, flags = [];
        let collectedFlags = 0;
        let keys = {};
        let gameStarted = false;
        let isPaused = false;
        
        // État physique
        let physics = {
            speed: 0,
            angularVel: 0,
            velocity: new THREE.Vector3(),
            pitch: 0,
            roll: 0
        };
        
        let wheels = [];
        let terrain;

        // Initialisation Three.js
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x4a90c2);
            scene.fog = new THREE.Fog(0x4a90c2, 150, 1200);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2500);
            camera.position.set(0, 10, -20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            document.getElementById('game-container').appendChild(renderer.domElement);

            // Éclairage amélioré
            const ambient = new THREE.AmbientLight(0x6688aa, 0.6);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xfff5e6, 1.3);
            sun.position.set(80, 150, 40);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            sun.shadow.camera.near = 10;
            sun.shadow.camera.far = 500;
            sun.shadow.camera.left = -250;
            sun.shadow.camera.right = 250;
            sun.shadow.camera.top = 250;
            sun.shadow.camera.bottom = -250;
            sun.shadow.bias = -0.0005;
            scene.add(sun);

            const hemi = new THREE.HemisphereLight(0x87ceeb, 0x3d5c3d, 0.5);
            scene.add(hemi);

            // Events
            window.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;
                if (e.key === 'Escape' && gameStarted) togglePause();
            });
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            window.addEventListener('resize', onWindowResize);
        }

        function createTerrain() {
            // Terrain PLAT
            const geo = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, 10, 10);
            const heightData = [];
            
            // Terrain complètement plat
            for (let i = 0; i < geo.attributes.position.array.length; i += 3) {
                geo.attributes.position.array[i + 2] = 0;
                heightData.push(0);
            }

            const mat = new THREE.MeshStandardMaterial({
                color: 0x4a7c3f,
                roughness: 0.9,
                metalness: 0.05
            });
            
            terrain = new THREE.Mesh(geo, mat);
            terrain.rotation.x = -Math.PI / 2;
            terrain.receiveShadow = true;
            terrain.userData.heightData = heightData;
            terrain.userData.segments = 10;
            scene.add(terrain);

            // Routes / Chemins
            for (let i = 0; i < 30; i++) {
                const pathGeo = new THREE.PlaneGeometry(8 + Math.random() * 6, 60 + Math.random() * 150);
                const pathMat = new THREE.MeshStandardMaterial({ color: 0x5a5a5a, roughness: 0.95 });
                const path = new THREE.Mesh(pathGeo, pathMat);
                path.rotation.x = -Math.PI / 2;
                path.rotation.z = Math.random() * Math.PI;
                path.position.set((Math.random() - 0.5) * WORLD_SIZE * 0.8, 0.02, (Math.random() - 0.5) * WORLD_SIZE * 0.8);
                path.receiveShadow = true;
                scene.add(path);
            }

            // Marquages au sol (lignes blanches)
            for (let i = 0; i < 50; i++) {
                const lineGeo = new THREE.PlaneGeometry(0.3, 8 + Math.random() * 20);
                const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });
                const line = new THREE.Mesh(lineGeo, lineMat);
                line.rotation.x = -Math.PI / 2;
                line.rotation.z = Math.random() * Math.PI;
                line.position.set((Math.random() - 0.5) * WORLD_SIZE * 0.7, 0.03, (Math.random() - 0.5) * WORLD_SIZE * 0.7);
                scene.add(line);
            }

            // Herbes (quelques éléments décoratifs)
            for (let i = 0; i < 200; i++) {
                const gGeo = new THREE.ConeGeometry(0.2, 0.8 + Math.random() * 0.5, 4);
                const gMat = new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(0.28, 0.5, 0.3 + Math.random() * 0.1) });
                const g = new THREE.Mesh(gGeo, gMat);
                g.position.set((Math.random() - 0.5) * WORLD_SIZE * 0.9, 0.3, (Math.random() - 0.5) * WORLD_SIZE * 0.9);
                g.castShadow = true;
                scene.add(g);
            }
        }

        function createCar() {
            car = new THREE.Group();
            
            // === Carrosserie principale ===
            const bodyMat = new THREE.MeshStandardMaterial({ 
                color: 0x1a1a1a, 
                metalness: 0.9, 
                roughness: 0.15 
            });
            
            // Chassis bas
            const chassisGeo = new THREE.BoxGeometry(1.8, 0.35, 3.8);
            const chassis = new THREE.Mesh(chassisGeo, bodyMat);
            chassis.position.y = 0.35;
            chassis.castShadow = true;
            car.add(chassis);
            
            // Carrosserie supérieure
            const upperMat = new THREE.MeshStandardMaterial({ 
                color: 0xcc2222, 
                metalness: 0.75, 
                roughness: 0.25 
            });
            
            // Cabine
            const cabinGeo = new THREE.BoxGeometry(1.5, 0.55, 1.6);
            const cabin = new THREE.Mesh(cabinGeo, upperMat);
            cabin.position.set(0, 0.8, -0.3);
            cabin.castShadow = true;
            car.add(cabin);
            
            // Capot
            const hoodGeo = new THREE.BoxGeometry(1.5, 0.25, 1.0);
            const hood = new THREE.Mesh(hoodGeo, upperMat);
            hood.position.set(0, 0.65, 1.2);
            hood.castShadow = true;
            car.add(hood);
            
            // Coffre
            const trunkGeo = new THREE.BoxGeometry(1.4, 0.3, 0.8);
            const trunk = new THREE.Mesh(trunkGeo, upperMat);
            trunk.position.set(0, 0.65, -1.6);
            trunk.castShadow = true;
            car.add(trunk);
            
            // === Vitres ===
            const glassMat = new THREE.MeshStandardMaterial({ 
                color: 0x1a2a3a, 
                metalness: 0.95, 
                roughness: 0.05, 
                transparent: true, 
                opacity: 0.7 
            });
            
            // Pare-brise
            const windshieldGeo = new THREE.BoxGeometry(1.3, 0.45, 0.08);
            const windshield = new THREE.Mesh(windshieldGeo, glassMat);
            windshield.position.set(0, 1.05, 0.35);
            windshield.rotation.x = -0.4;
            car.add(windshield);
            
            // Vitre arrière
            const rearGeo = new THREE.BoxGeometry(1.2, 0.4, 0.08);
            const rear = new THREE.Mesh(rearGeo, glassMat);
            rear.position.set(0, 1.0, -1.0);
            rear.rotation.x = 0.35;
            car.add(rear);
            
            // Vitres latérales
            const sideGeo = new THREE.BoxGeometry(0.08, 0.4, 1.0);
            const leftSide = new THREE.Mesh(sideGeo, glassMat);
            leftSide.position.set(-0.75, 0.95, -0.3);
            car.add(leftSide);
            
            const rightSide = new THREE.Mesh(sideGeo, glassMat);
            rightSide.position.set(0.75, 0.95, -0.3);
            car.add(rightSide);
            
            // === Roues ===
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 });
            const rimMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.95, roughness: 0.15 });
            
            const wheelPositions = [
                [-0.8, 0.35, 1.2], [0.8, 0.35, 1.2],
                [-0.8, 0.35, -1.2], [0.8, 0.35, -1.2]
            ];
            
            wheelPositions.forEach((pos, i) => {
                const wGroup = new THREE.Group();
                
                // Pneu
                const tireGeo = new THREE.TorusGeometry(0.32, 0.12, 12, 24);
                const tire = new THREE.Mesh(tireGeo, wheelMat);
                tire.rotation.y = Math.PI / 2;
                wGroup.add(tire);
                
                // Jante
                const rimGeo = new THREE.CylinderGeometry(0.24, 0.24, 0.18, 16);
                const rim = new THREE.Mesh(rimGeo, rimMat);
                rim.rotation.z = Math.PI / 2;
                wGroup.add(rim);
                
                // Rayons
                for (let j = 0; j < 6; j++) {
                    const spokeGeo = new THREE.BoxGeometry(0.03, 0.2, 0.03);
                    const spoke = new THREE.Mesh(spokeGeo, rimMat);
                    spoke.rotation.z = (j / 6) * Math.PI * 2;
                    spoke.position.x = Math.sin(spoke.rotation.z) * 0.15;
                    spoke.position.y = Math.cos(spoke.rotation.z) * 0.15;
                    wGroup.add(spoke);
                }
                
                wGroup.position.set(...pos);
                wGroup.castShadow = true;
                car.add(wGroup);
                wheels.push({ mesh: wGroup, baseY: pos[1] });
            });
            
            // === Phares ===
            const lightMat = new THREE.MeshStandardMaterial({ 
                color: 0xffffee, 
                emissive: 0xffffee, 
                emissiveIntensity: 0.8 
            });
            
            const lightGeo = new THREE.SphereGeometry(0.12, 12, 12);
            const leftLight = new THREE.Mesh(lightGeo, lightMat);
            leftLight.position.set(-0.55, 0.4, 1.9);
            car.add(leftLight);
            
            const rightLight = new THREE.Mesh(lightGeo, lightMat);
            rightLight.position.set(0.55, 0.4, 1.9);
            car.add(rightLight);
            
            // === Feux arrière ===
            const tailMat = new THREE.MeshStandardMaterial({ 
                color: 0xff2200, 
                emissive: 0xff2200, 
                emissiveIntensity: 0.4 
            });
            
            const tailGeo = new THREE.BoxGeometry(0.25, 0.12, 0.04);
            const leftTail = new THREE.Mesh(tailGeo, tailMat);
            leftTail.position.set(-0.6, 0.4, -1.9);
            car.add(leftTail);
            
            const rightTail = new THREE.Mesh(tailGeo, tailMat);
            rightTail.position.set(0.6, 0.4, -1.9);
            car.add(rightTail);
            
            // === Aileron ===
            const spoilerMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.6 });
            const spoilerGeo = new THREE.BoxGeometry(1.5, 0.08, 0.35);
            const spoiler = new THREE.Mesh(spoilerGeo, spoilerMat);
            spoiler.position.set(0, 1.15, -1.75);
            car.add(spoiler);
            
            // Supports
            const supportGeo = new THREE.BoxGeometry(0.08, 0.25, 0.08);
            const leftSup = new THREE.Mesh(supportGeo, spoilerMat);
            leftSup.position.set(-0.55, 1.0, -1.75);
            car.add(leftSup);
            
            const rightSup = new THREE.Mesh(supportGeo, spoilerMat);
            rightSup.position.set(0.55, 1.0, -1.75);
            car.add(rightSup);

            car.position.y = 0;
            scene.add(car);
        }

        function createFlags() {
            for (let i = 0; i < FLAG_COUNT; i++) {
                const flag = createFlag();
                const angle = Math.random() * Math.PI * 2;
                const dist = 120 + Math.random() * (WORLD_SIZE / 2 - 140);
                flag.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
                flag.userData.collected = false;
                flags.push(flag);
                scene.add(flag);
            }
        }

        function createFlag() {
            const group = new THREE.Group();
            
            // Base
            const baseGeo = new THREE.CylinderGeometry(1.2, 1.6, 0.8, 12);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = 0.4;
            base.castShadow = true;
            group.add(base);
            
            // Mât
            const poleGeo = new THREE.CylinderGeometry(0.12, 0.15, 7, 8);
            const poleMat = new THREE.MeshStandardMaterial({ color: 0x6a5a4a, roughness: 0.7 });
            const pole = new THREE.Mesh(poleGeo, poleMat);
            pole.position.y = 4;
            pole.castShadow = true;
            group.add(pole);
            
            // Drapeau
            const colors = [0xff3344, 0x33ff66, 0x3366ff, 0xffdd33, 0xff33dd, 0x33ddff];
            const flagColor = colors[Math.floor(Math.random() * colors.length)];
            const flagGeo = new THREE.PlaneGeometry(2.5, 1.6);
            const flagMat = new THREE.MeshStandardMaterial({ 
                color: flagColor, 
                side: THREE.DoubleSide,
                emissive: flagColor,
                emissiveIntensity: 0.15
            });
            const flag = new THREE.Mesh(flagGeo, flagMat);
            flag.position.set(1.2, 6.5, 0);
            group.add(flag);
            
            // Anneau lumineux
            const ringGeo = new THREE.TorusGeometry(1.8, 0.15, 8, 24);
            const ringMat = new THREE.MeshStandardMaterial({ 
                color: 0xffd700, 
                emissive: 0xffd700, 
                emissiveIntensity: 0.4 
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.y = 7.5;
            ring.rotation.x = Math.PI / 2;
            group.add(ring);
            
            group.userData.flag = flag;
            group.userData.ring = ring;
            group.userData.baseY = 6.5;
            
            return group;
        }

        function createDecorations() {
            // Arbres
            for (let i = 0; i < 120; i++) {
                const tree = createTree();
                const angle = Math.random() * Math.PI * 2;
                const dist = 60 + Math.random() * (WORLD_SIZE / 2 - 70);
                tree.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
                scene.add(tree);
            }
            
            // Rochers
            for (let i = 0; i < 60; i++) {
                const rockGeo = new THREE.DodecahedronGeometry(1.2 + Math.random() * 3, 0);
                const rockMat = new THREE.MeshStandardMaterial({ 
                    color: 0x444444 + Math.random() * 0x222222,
                    roughness: 0.95,
                    flatShading: true
                });
                const rock = new THREE.Mesh(rockGeo, rockMat);
                const angle = Math.random() * Math.PI * 2;
                const dist = 40 + Math.random() * (WORLD_SIZE / 2 - 50);
                rock.position.set(Math.cos(angle) * dist, 0.8, Math.sin(angle) * dist);
                rock.rotation.set(Math.random(), Math.random(), Math.random());
                rock.castShadow = true;
                scene.add(rock);
            }
            
            // Bâtiments
            for (let i = 0; i < 15; i++) {
                const building = createBuilding();
                const angle = Math.random() * Math.PI * 2;
                const dist = 180 + Math.random() * (WORLD_SIZE / 2 - 200);
                building.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
                building.rotation.y = Math.random() * Math.PI * 2;
                scene.add(building);
            }
        }
        
        function createTree() {
            const tree = new THREE.Group();
            
            const trunkGeo = new THREE.CylinderGeometry(0.35, 0.5, 4 + Math.random() * 2, 6);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3a28, roughness: 0.9 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 2.5;
            trunk.castShadow = true;
            tree.add(trunk);
            
            const foliageColors = [0x2a5a27, 0x3a6a37, 0x4a7a47];
            for (let i = 0; i < 3; i++) {
                const foliageGeo = new THREE.ConeGeometry(2.2 - i * 0.45, 3.5 - i, 6);
                const foliageMat = new THREE.MeshStandardMaterial({ color: foliageColors[i], flatShading: true });
                const foliage = new THREE.Mesh(foliageGeo, foliageMat);
                foliage.position.y = 5.5 + i * 1.8;
                foliage.castShadow = true;
                tree.add(foliage);
            }
            
            return tree;
        }
        
        function createBuilding() {
            const building = new THREE.Group();
            
            const w = 6 + Math.random() * 8;
            const h = 10 + Math.random() * 18;
            const d = 6 + Math.random() * 8;
            
            const buildingGeo = new THREE.BoxGeometry(w, h, d);
            const buildingMat = new THREE.MeshStandardMaterial({ 
                color: 0x555555 + Math.random() * 0x333333,
                roughness: 0.75
            });
            const buildingMesh = new THREE.Mesh(buildingGeo, buildingMat);
            buildingMesh.position.y = h / 2;
            buildingMesh.castShadow = true;
            building.add(buildingMesh);
            
            const roofGeo = new THREE.ConeGeometry(Math.max(w, d) * 0.6, h * 0.25, 4);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = h + h * 0.125;
            roof.rotation.y = Math.PI / 4;
            roof.castShadow = true;
            building.add(roof);
            
            return building;
        }

        function getTerrainHeight(x, z) {
            if (!terrain) return 0;
            
            const halfSize = WORLD_SIZE / 2;
            const segments = 10;
            const segSize = WORLD_SIZE / segments;
            
            const gx = Math.floor((x + halfSize) / segSize);
            const gz = Math.floor((z + halfSize) / segSize);
            
            const cx = Math.max(0, Math.min(segments - 1, gx));
            const cz = Math.max(0, Math.min(segments - 1, gz));
            
            const index = cz * (segments + 1) + cx;
            const hd = terrain.userData.heightData;
            
            return hd && hd[index] !== undefined ? hd[index] : 0;
        }

        function updateCarPhysics(delta) {
            if (!car || !gameStarted || isPaused) return;
            
            const p = physics;
            const cfg = CAR;
            
            const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(car.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(car.quaternion);
            
            // Inputs
            const throttle = (keys['w'] || keys['arrowup']) ? 1 : 0;
            const brake = (keys['s'] || keys['arrowdown'] || keys[' ']) ? 1 : 0;
            const steerL = (keys['a'] || keys['arrowleft']) ? 1 : 0;
            const steerR = (keys['d'] || keys['arrowright']) ? 1 : 0;
            
            // Vitesse actuelle
            p.speed = p.velocity.length();
            const speedKmh = p.speed * 3.6;
            document.getElementById('speed-value').textContent = Math.round(speedKmh);
            
            // Rapport
            if (p.speed < 0.5) {
                document.getElementById('gear-display').textContent = 'N';
            } else {
                const fwd = p.velocity.dot(forward);
                if (fwd > 0) {
                    if (speedKmh < 25) document.getElementById('gear-display').textContent = '1';
                    else if (speedKmh < 50) document.getElementById('gear-display').textContent = '2';
                    else if (speedKmh < 85) document.getElementById('gear-display').textContent = '3';
                    else if (speedKmh < 120) document.getElementById('gear-display').textContent = '4';
                    else document.getElementById('gear-display').textContent = '5';
                } else {
                    document.getElementById('gear-display').textContent = 'R';
                }
            }
            
            // Accélération
            if (throttle && !brake) {
                const accel = forward.clone().multiplyScalar(cfg.acceleration * throttle * delta);
                p.velocity.add(accel);
            }
            
            // Freinage
            if (brake) {
                const brakeVec = p.velocity.clone().normalize().multiplyScalar(-cfg.brakeForce * brake * delta);
                if (p.speed < cfg.brakeForce * delta) {
                    p.velocity.set(0, 0, 0);
                } else {
                    p.velocity.add(brakeVec);
                }
            }
            
            // Vitesse max
            const maxSpd = (keys['s'] || keys['arrowdown']) ? cfg.reverseSpeed : cfg.maxSpeed;
            if (p.speed > maxSpd) {
                p.velocity.normalize().multiplyScalar(maxSpd);
            }
            
            // Friction
            p.velocity.multiplyScalar(cfg.friction);
            
            // Direction
            if (p.speed > 0.3) {
                const turnMult = Math.min(1, p.speed / 15);
                const turnRate = cfg.turnSpeed * (1.5 - turnMult * 0.5);
                const turnDir = p.velocity.dot(forward) > 0 ? 1 : -1;
                const steer = (steerR - steerL) * turnRate * delta * turnDir;
                
                // Légère perte de grip dans les virages serrés
                if (p.speed > 25 && Math.abs(steer) > 0.02) {
                    const lateral = right.clone().multiplyScalar(p.velocity.dot(right) * 0.03);
                    p.velocity.sub(lateral);
                }
                
                car.rotation.y += steer;
            }
            
            // Déplacement
            car.position.add(p.velocity.clone().multiplyScalar(delta));
            
            // Limites monde
            const lim = WORLD_SIZE / 2 - 15;
            car.position.x = Math.max(-lim, Math.min(lim, car.position.x));
            car.position.z = Math.max(-lim, Math.min(lim, car.position.z));
            
            // Hauteur terrain (plat)
            car.position.y = 0.35;
            
            // Inclinaison
            const targetPitch = -p.velocity.dot(forward) * 0.0015;
            const targetRoll = p.velocity.dot(right) * 0.0025;
            p.pitch += (targetPitch - p.pitch) * 4 * delta;
            p.roll += (targetRoll - p.roll) * 4 * delta;
            car.rotation.x = p.pitch;
            car.rotation.z = p.roll;
            
            // Animation roues
            const spin = p.speed * delta * 1.5;
            wheels.forEach((w, i) => {
                w.mesh.children[0].rotation.x += spin;
                const susp = Math.sin(Date.now() * 0.008 + i) * 0.03 * Math.min(1, p.speed / 30);
                w.mesh.position.y = w.baseY + susp;
            });
        }

        function updateCamera() {
            if (!car || !gameStarted) return;
            
            const speedFactor = Math.min(1, physics.speed / 80);
            const dist = 16 + speedFactor * 8;
            const height = 7 + speedFactor * 3;
            
            const offset = new THREE.Vector3(0, height, -dist).applyQuaternion(car.quaternion);
            const target = car.position.clone().add(offset);
            camera.position.lerp(target, 0.06);
            
            const lookAhead = physics.velocity.clone().multiplyScalar(0.25);
            const lookAt = car.position.clone().add(lookAhead);
            lookAt.y += 1.5;
            camera.lookAt(lookAt);
        }

        function checkFlagCollection() {
            if (!car || !gameStarted) return;
            
            flags.forEach(flag => {
                if (flag.userData.collected) return;
                
                if (car.position.distanceTo(flag.position) < 5) {
                    flag.userData.collected = true;
                    collectedFlags++;
                    document.getElementById('score').textContent = `Drapeaux: ${collectedFlags} / ${FLAG_COUNT}`;
                    animateFlagCollection(flag);
                    
                    if (collectedFlags >= FLAG_COUNT) {
                        setTimeout(() => {
                            document.getElementById('win-screen').style.display = 'block';
                            isPaused = true;
                        }, 400);
                    }
                }
            });
        }
        
        function animateFlagCollection(flag) {
            let s = 1;
            const anim = () => {
                s += 0.12;
                flag.scale.set(s, s, s);
                flag.position.y += 0.6;
                flag.rotation.y += 0.25;
                if (flag.userData.flag) flag.userData.flag.material.emissiveIntensity = 1.5;
                if (s < 3.5) requestAnimationFrame(anim);
                else scene.remove(flag);
            };
            anim();
        }

        function updateCompass() {
            if (!car || flags.length === 0 || !gameStarted) return;
            
            let nearest = null;
            let minDist = Infinity;
            
            flags.forEach(flag => {
                if (!flag.userData.collected) {
                    const d = car.position.distanceTo(flag.position);
                    if (d < minDist) { minDist = d; nearest = flag; }
                }
            });
            
            if (nearest) {
                const dir = new THREE.Vector3().subVectors(nearest.position, car.position).normalize();
                const carDir = new THREE.Vector3(0, 0, 1).applyQuaternion(car.quaternion);
                const angle = Math.atan2(
                    dir.x * carDir.z - dir.z * carDir.x,
                    dir.x * carDir.x + dir.z * carDir.z
                );
                document.getElementById('compass-arrow').style.transform = `rotate(${angle}rad)`;
                document.getElementById('distance').textContent = Math.round(minDist) + ' m';
            }
        }
        
        function animateFlags(time) {
            flags.forEach(flag => {
                if (!flag.userData.collected && flag.userData.flag) {
                    flag.userData.flag.rotation.y = Math.sin(time * 2.5) * 0.35;
                    flag.userData.flag.position.y = flag.userData.baseY + Math.sin(time * 3) * 0.15;
                    if (flag.userData.ring) flag.userData.ring.rotation.y = time * 0.8;
                }
            });
        }

        let lastTime = 0;
        function animate(time = 0) {
            requestAnimationFrame(animate);
            
            const delta = Math.min((time - lastTime) / 1000, 0.04);
            lastTime = time;
            
            if (gameStarted && !isPaused) {
                updateCarPhysics(delta);
                updateCamera();
                checkFlagCollection();
                updateCompass();
                animateFlags(time / 1000);
            }
            
            renderer.render(scene, camera);
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Fonctions menu
        function startGame() {
            FLAG_COUNT = parseInt(document.getElementById('flag-count').value);
            
            createTerrain();
            createCar();
            createFlags();
            createDecorations();
            
            physics = { speed: 0, angularVel: 0, velocity: new THREE.Vector3(), pitch: 0, roll: 0 };
            collectedFlags = 0;
            
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('score').textContent = `Drapeaux: 0 / ${FLAG_COUNT}`;
            
            gameStarted = true;
            isPaused = false;
        }
        
        function showSettings() { document.getElementById('settings-panel').style.display = 'block'; }
        function hideSettings() { document.getElementById('settings-panel').style.display = 'none'; }
        
        function togglePause() {
            if (isPaused && gameStarted) resumeGame();
            else if (gameStarted) {
                isPaused = true;
                document.getElementById('pause-overlay').style.display = 'flex';
            }
        }
        
        function resumeGame() {
            isPaused = false;
            document.getElementById('pause-overlay').style.display = 'none';
            document.getElementById('win-screen').style.display = 'none';
        }
        
        function quitToMenu() {
            isPaused = false;
            gameStarted = false;
            document.getElementById('pause-overlay').style.display = 'none';
            document.getElementById('win-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
            
            while(scene.children.length > 0) scene.remove(scene.children[0]);
            flags = [];
            wheels = [];
        }
        
        function restartGame() {
            flags.forEach(f => scene.remove(f));
            flags = [];
            createFlags();
            
            collectedFlags = 0;
            document.getElementById('score').textContent = `Drapeaux: 0 / ${FLAG_COUNT}`;
            document.getElementById('win-screen').style.display = 'none';
            
            car.position.set(0, 0, 0);
            car.rotation.set(0, 0, 0);
            physics.velocity.set(0, 0, 0);
            physics.speed = 0;
            physics.pitch = 0;
            physics.roll = 0;
            
            isPaused = false;
        }
        
        init();
        animate();
    </script>
</body>
</html>
